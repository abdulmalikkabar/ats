<script>

/* ==========================================================
 * ATS Router Implementation
 * ==========================================================
 */

ATS.router.load = function(pageName, element){

    if(pageName === this.currentPage){
        return;
    }

    this.currentPage = pageName;

    

    ATS.api

    .call("getPage", pageName)

    .then((html)=>{

        const content = document.getElementById("content");

        content.style.opacity = "0";

        setTimeout(()=>{

            content.innerHTML = html;

            content.style.transition = "opacity .25s";

            content.style.opacity = "1";

            ATS.loading.hide();

        },200);

    })

    .catch((err)=>{

     

        document.getElementById("content").innerHTML = `
            <div class="card">
                <h3 style="color:red">
                    Gagal Memuat Halaman
                </h3>
                <br>
                ${err.message}
            </div>
        `;

    });

    ATS.router.active(element);

};

/* ==========================================================
 * Active Menu
 * ==========================================================
 */

ATS.router.active = function(element){

    document
        .querySelectorAll(".sidebar-menu li")
        .forEach(item => item.classList.remove("active"));

    if(element){

        element.classList.add("active");

    }

};

/* ==========================================================
 * Startup
 * ==========================================================
 */

window.onload = function(){

    const menu = document.querySelector(".sidebar-menu li");

    if(menu){

        menu.classList.add("active");

    }

};

</script>
