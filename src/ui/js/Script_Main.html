<script>

/* ==========================================================
   AI Teacher Studio Framework
   Version 1.0
========================================================== */

const ATS = {

    showLoading(){

        document
            .getElementById("loadingOverlay")
            .classList
            .add("show");

    },

    hideLoading(){

        document
            .getElementById("loadingOverlay")
            .classList
            .remove("show");

    }

};

let currentPage = "Page_Dashboard";

/* ==========================================================
   Load Page
========================================================== */

function loadPage(pageName, element){

    if(pageName === currentPage){
        return;
    }

    currentPage = pageName;

    ATS.showLoading();

    google.script.run

        .withSuccessHandler(function(html){

            const content = document.getElementById("content");

            content.style.opacity = "0";

            setTimeout(function(){

                content.innerHTML = html;

                content.style.transition = "opacity .25s";

                content.style.opacity = "1";

                ATS.hideLoading();

            },200);

        })

        .withFailureHandler(function(err){

            ATS.hideLoading();

            document.getElementById("content").innerHTML =

            `
                <div class="card">

                    <h3 style="color:red">

                        Gagal Memuat Halaman

                    </h3>

                    <br>

                    ${err.message}

                </div>
            `;

        })

        .getPage(pageName);

    setActiveMenu(element);

}

/* ==========================================================
   Active Menu
========================================================== */

function setActiveMenu(element){

    document
        .querySelectorAll(".sidebar-menu li")
        .forEach(function(item){

            item.classList.remove("active");

        });

    if(element){

        element.classList.add("active");

    }

}

/* ==========================================================
   Startup
========================================================== */

window.onload = function(){

    const menu = document.querySelector(".sidebar-menu li");

    if(menu){

        menu.classList.add("active");

    }

};

</script>
