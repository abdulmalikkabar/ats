<script>

/* ==========================================================
 * ATS Router Implementation
 * ==========================================================
 */

ATS.router.load = function(pageName, element){

    if(pageName === this.currentPage){
        return;
    }

    this.currentPage = pageName;

    ATS.loading.show();

    ATS.api
        .call("getPage", pageName)

        .then((html)=>{

            const content =
                document.getElementById("content");

            if(!content){

                throw new Error(
                    'Elemen "#content" tidak ditemukan.'
                );

            }

            content.style.opacity = "0";

            setTimeout(()=>{

                content.innerHTML = html;

                content.style.transition =
                    "opacity .25s";

                content.style.opacity = "1";

                ATS.loading.hide();

                ATS.router.initPage(pageName);

            },200);

        })

        .catch((err)=>{

            ATS.loading.hide();

            const content =
                document.getElementById("content");

            const message =
                err && err.message
                    ? err.message
                    : String(err);

            if(content){

                content.innerHTML = `
                    <div class="card">

                        <h3 style="color:red">
                            Gagal Memuat Halaman
                        </h3>

                        <br>

                        ${ATS.router.escape(message)}

                    </div>
                `;

            }

            console.error(
                "[ROUTER] Gagal memuat halaman:",
                err
            );

        });

    ATS.router.active(element);

};


/* ==========================================================
 * Page Initializer
 * ==========================================================
 */

ATS.router.initPage = function(pageName){

    console.log(
        "[ROUTER] Init:",
        pageName
    );

    switch(pageName){

        case "Page_ATP":

            /*
             * Event Handler
             */
            if(
                ATS.ATP &&
                ATS.ATP.events &&
                typeof ATS.ATP.events.bind === "function"
            ){

                ATS.ATP.events.bind();

            }else{

                console.warn(
                    "[ROUTER] ATS.ATP.events belum tersedia."
                );

            }

            /*
             * Table Loader
             */
            if(
                ATS.ATP &&
                ATS.ATP.table &&
                typeof ATS.ATP.table.load === "function"
            ){

                ATS.ATP.table.load();

            }else{

                console.warn(
                    "[ROUTER] ATS.ATP.table belum tersedia."
                );

            }

            break;


        case "Page_Dashboard":

            console.log(
                "[ROUTER] Dashboard aktif."
            );

            break;


        default:

            console.log(
                "[ROUTER] Tidak ada initializer:",
                pageName
            );

    }

};


/* ==========================================================
 * Active Menu
 * ==========================================================
 */

ATS.router.active = function(element){

    document
        .querySelectorAll(".sidebar-menu li")
        .forEach((item)=>{

            item.classList.remove("active");

        });

    if(element){

        element.classList.add("active");

    }

};


/* ==========================================================
 * Escape HTML
 * ==========================================================
 */

ATS.router.escape = function(value){

    return String(
        value ?? ""
    )
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#039;");

};


/* ==========================================================
 * Startup
 * ==========================================================
 */

window.addEventListener(
    "load",
    function(){

        const menu =
            document.querySelector(
                ".sidebar-menu li"
            );

        if(menu){

            menu.classList.add("active");

        }

    }
);

</script>
