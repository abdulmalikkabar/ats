<div class="ats-table-wrapper">

    <div class="ats-table-toolbar">

        <div class="ats-table-search">
            <input
                type="text"
                id="ats-table-search"
                class="form-control"
                placeholder="Cari data..."
            >
        </div>

    </div>

    <div class="ats-table-container">

        <table class="ats-table">

            <thead id="ats-table-head"></thead>

            <tbody id="ats-table-body"></tbody>

        </table>

    </div>

    <div
        id="ats-table-empty"
        class="ats-table-empty"
        style="display:none;"
    >
        Data tidak tersedia.
    </div>

</div>
