<style>

/* ==========================================================
   AI Teacher Studio (ATS)
   UI Framework v1.0
   ========================================================== */

/* ==========================================================
   RESET
========================================================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

/* ==========================================================
   ROOT VARIABLES
========================================================== */

:root{

    --primary:#1976D2;
    --primary-dark:#1565C0;

    --sidebar:#F5F7FA;
    --content:#FFFFFF;
    --footer:#ECEFF1;

    --text:#333333;
    --border:#E0E0E0;

    --success:#43A047;
    --warning:#FB8C00;
    --danger:#E53935;

    --radius:8px;

    --shadow:0 2px 8px rgba(0,0,0,.08);

}

/* ==========================================================
   BODY
========================================================== */

body{

    display:grid;

    grid-template-columns:240px 1fr;

    grid-template-rows:60px 1fr 40px;

    height:100vh;

    background:#FAFAFA;

    color:var(--text);

}

/* ==========================================================
   HEADER
========================================================== */

.header{

    grid-column:1/3;

    background:var(--primary);

    color:white;

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:0 24px;

    box-shadow:0 2px 6px rgba(0,0,0,.15);

    z-index:10;

}

.header h2{

    font-size:20px;

}

.header .user{

    font-size:14px;

}

/* ==========================================================
   SIDEBAR
========================================================== */

.sidebar{

    background:var(--sidebar);

    border-right:1px solid var(--border);

    overflow-y:auto;

    padding:20px 0;

}

.sidebar-title{

    padding:0 20px 20px;

    border-bottom:1px solid var(--border);

    margin-bottom:15px;

}

.sidebar-title h3{

    color:var(--primary);

}

.sidebar-menu{

    list-style:none;

}

.sidebar-menu li{

    margin:4px 12px;

    padding:12px 15px;

    border-radius:var(--radius);

    cursor:pointer;

    user-select:none;

    transition:
        background .25s,
        color .25s,
        transform .15s;

}

.sidebar-menu li:hover{

    background:#E3F2FD;

}

.sidebar-menu li:active{

    transform:scale(.98);

}

.sidebar-menu li.active{

    background:var(--primary);

    color:white;

    font-weight:bold;

}

.sidebar-footer{

    margin-top:30px;

    padding:15px;

    text-align:center;

    font-size:12px;

    color:#777;

    border-top:1px solid #DDD;

}

/* ==========================================================
   CONTENT
========================================================== */

.content{

    background:var(--content);

    padding:25px;

    overflow:auto;

    transition:opacity .25s ease;

}

/* ==========================================================
   FOOTER
========================================================== */

.footer{

    grid-column:1/3;

    background:var(--footer);

    border-top:1px solid var(--border);

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:13px;

}

/* ==========================================================
   CARD
========================================================== */

.card{

    background:white;

    border-radius:10px;

    padding:20px;

    box-shadow:var(--shadow);

    margin-bottom:20px;

}

/* ==========================================================
   BUTTON
========================================================== */

.btn{

    border:none;

    border-radius:6px;

    padding:10px 18px;

    cursor:pointer;

    transition:.2s;

}

.btn-primary{

    background:var(--primary);

    color:white;

}

.btn-primary:hover{

    background:var(--primary-dark);

}

.btn:disabled{

    cursor:not-allowed;

    opacity:.6;

}

/* ==========================================================
   TABLE
========================================================== */

table{

    width:100%;

    border-collapse:collapse;

}

th{

    background:var(--primary);

    color:white;

    padding:12px;

}

td{

    padding:10px;

    border-bottom:1px solid #EEEEEE;

}

tr:hover{

    background:#FAFAFA;

}

/* ==========================================================
   LOADING
========================================================== */

.loading-overlay{

    position:fixed;

    inset:0;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    background:rgba(255,255,255,.75);

    z-index:9999;

    opacity:0;

    visibility:hidden;

    transition:.25s;

}

.loading-overlay.show{

    opacity:1;

    visibility:visible;

}

.loading-spinner{

    width:48px;

    height:48px;

    border:5px solid #E3F2FD;

    border-top:5px solid var(--primary);

    border-radius:50%;

    animation:spin .8s linear infinite;

}

.loading-text{

    margin-top:15px;

    color:#555;

    font-size:15px;

}

@keyframes spin{

    from{

        transform:rotate(0deg);

    }

    to{

        transform:rotate(360deg);

    }

}

/* ==========================================================
   ANIMATION
========================================================== */

.fade-in{

    animation:fadeIn .25s;

}

@keyframes fadeIn{

    from{

        opacity:0;

    }

    to{

        opacity:1;

    }

}

/* ==========================================================
   UTILITIES
========================================================== */

.text-center{

    text-align:center;

}

.text-right{

    text-align:right;

}

.mt-10{

    margin-top:10px;

}

.mt-20{

    margin-top:20px;

}

.mb-10{

    margin-bottom:10px;

}

.mb-20{

    margin-bottom:20px;

}

/* ==========================================================
   SCROLLBAR
========================================================== */

::-webkit-scrollbar{

    width:10px;

}

::-webkit-scrollbar-track{

    background:#F3F3F3;

}

::-webkit-scrollbar-thumb{

    background:#C5C5C5;

    border-radius:20px;

}

::-webkit-scrollbar-thumb:hover{

    background:#999;

}

</style>
