<style>

/* ==========================================================
   AI Teacher Studio (ATS)
   Global Style v1.0
========================================================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

:root{

    --primary:#1976D2;
    --primary-dark:#1565C0;

    --sidebar:#F5F7FA;
    --content:#FFFFFF;
    --footer:#ECEFF1;

    --text:#333333;
    --border:#E0E0E0;

}

body{

    display:grid;

    grid-template-columns:240px 1fr;

    grid-template-rows:60px 1fr 40px;

    height:100vh;

    background:#FAFAFA;

    color:var(--text);

}

/* ==========================================================
   HEADER
========================================================== */

.header{

    grid-column:1/3;

    background:var(--primary);

    color:white;

    display:flex;

    align-items:center;

    justify-content:space-between;

    padding:0 24px;

    box-shadow:0 2px 6px rgba(0,0,0,.15);

    z-index:10;

}

.header h2{

    font-size:20px;

}

.header .user{

    font-size:14px;

}

/* ==========================================================
   SIDEBAR
========================================================== */

.sidebar{

    background:var(--sidebar);

    border-right:1px solid var(--border);

    padding:20px 0;

    overflow-y:auto;

}

.sidebar-title{

    padding:0 20px 20px;

    border-bottom:1px solid var(--border);

    margin-bottom:15px;

}

.sidebar-title h3{

    color:var(--primary);

    font-size:18px;

}

.sidebar-menu{

    list-style:none;

}

.sidebar-menu li{

    margin:4px 12px;

    padding:12px 15px;

    border-radius:8px;

    cursor:pointer;

    transition:.25s;

    user-select:none;

}

.sidebar-menu li:hover{

    background:#E3F2FD;

}

.sidebar-menu li.active{

    background:var(--primary);

    color:white;

    font-weight:bold;

}

/* ==========================================================
   CONTENT
========================================================== */

.content{

    background:var(--content);

    overflow:auto;

    padding:25px;

}

/* ==========================================================
   FOOTER
========================================================== */

.footer{

    grid-column:1/3;

    background:var(--footer);

    border-top:1px solid var(--border);

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:13px;

}

/* ==========================================================
   CARD
========================================================== */

.card{

    background:white;

    border-radius:10px;

    padding:20px;

    box-shadow:0 2px 8px rgba(0,0,0,.08);

    margin-bottom:20px;

}

/* ==========================================================
   BUTTON
========================================================== */

.btn{

    border:none;

    border-radius:6px;

    padding:10px 18px;

    cursor:pointer;

    transition:.2s;

}

.btn-primary{

    background:var(--primary);

    color:white;

}

.btn-primary:hover{

    background:var(--primary-dark);

}

/* ==========================================================
   TABLE
========================================================== */

table{

    width:100%;

    border-collapse:collapse;

}

th{

    background:var(--primary);

    color:white;

    padding:12px;

}

td{

    padding:10px;

    border-bottom:1px solid #EEEEEE;

}

tr:hover{

    background:#FAFAFA;

}


/* ==========================================================
   LOADING OVERLAY
========================================================== */

.loading-overlay{

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

    background:rgba(255,255,255,.75);

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    z-index:9999;

    opacity:0;

    visibility:hidden;

    transition:.25s;

}

.loading-overlay.show{

    opacity:1;

    visibility:visible;

}

.loading-spinner{

    width:48px;

    height:48px;

    border:5px solid #E3F2FD;

    border-top:5px solid #1976D2;

    border-radius:50%;

    animation:spin .8s linear infinite;

}

.loading-text{

    margin-top:15px;

    color:#555;

    font-size:15px;

}

@keyframes spin{

    from{

        transform:rotate(0deg);

    }

    to{

        transform:rotate(360deg);

    }

}



</style>
