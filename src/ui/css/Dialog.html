<style>

/* ==========================================================
   ATS Dialog Framework v1.0
========================================================== */

.dialog-overlay{

    position:fixed;

    inset:0;

    background:rgba(0,0,0,.45);

    display:flex;

    justify-content:center;

    align-items:center;

    z-index:10000;

    opacity:0;

    visibility:hidden;

    transition:.25s;

}

.dialog-overlay.show{

    opacity:1;

    visibility:visible;

}

.dialog{

    width:420px;

    max-width:95%;

    background:#FFFFFF;

    border-radius:10px;

    overflow:hidden;

    box-shadow:0 8px 30px rgba(0,0,0,.25);

    animation:dialogShow .25s ease;

}

.dialog-header{

    padding:16px 20px;

    background:#1976D2;

    color:#FFF;

    font-size:18px;

    font-weight:bold;

}

.dialog-body{

    padding:25px 20px;

    color:#444;

    line-height:1.6;

}

.dialog-footer{

    display:flex;

    justify-content:flex-end;

    gap:10px;

    padding:15px 20px;

    border-top:1px solid #EEEEEE;

}

.dialog-footer button{

    min-width:90px;

}

@keyframes dialogShow{

    from{

        opacity:0;

        transform:translateY(-20px);

    }

    to{

        opacity:1;

        transform:translateY(0);

    }

}

</style>
