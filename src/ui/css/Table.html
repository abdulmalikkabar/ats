<style>

.ats-table-wrapper{
    width:100%;
}

.ats-table-toolbar{
    display:flex;

}

.ats-table-search{
    width:100%;
    max-width:320px;
}

.ats-table-container{

    overflow-x:auto;
    border:1px solid var(--border);
    border-radius:10px;
    background:#FFFFFF;
}

.ats-table{
    width:100%;
    border-collapse:collapse;
}

.ats-table th,

    border-bottom:1px solid var(--border);

    vertical-align:middle;
}

.ats-table th{
    background:#F7F8FA;

}

.ats-table td{

}

}

.ats-table-loading{

}

    display:flex;
    align-items:center;
    gap:8px;
}
