<div id="ats-modal" class="modal-overlay" aria-hidden="true">

    <div
        class="modal-box modal-medium"
        role="dialog"
        aria-modal="true"
        aria-labelledby="ats-modal-title"
    >

        <div class="modal-header">

            <h3 id="ats-modal-title">
                Modal
            </h3>

            <button
                type="button"
                class="modal-close"
                id="ats-modal-close"
                aria-label="Tutup modal"
            >
                ×
            </button>

        </div>

        <div
            id="ats-modal-content"
            class="modal-body"
        >
        </div>

        <div
            id="ats-modal-footer"
            class="modal-footer"
        >
        </div>

    </div>

</div>
