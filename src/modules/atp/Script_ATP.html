<script>
(function () {

  function initATPPage() {

    console.log("[ATP] initATPPage dijalankan");

    if (!window.ATS) {
      console.error("[ATP] window.ATS belum tersedia");
      return;
    }

    if (!ATS.ATP) {
      console.error("[ATP] ATS.ATP belum tersedia");
      return;
    }

    if (!ATS.ATP.table) {
      console.error("[ATP] ATS.ATP.table belum tersedia");
      return;
    }

    if (typeof ATS.ATP.table.load !== "function") {
      console.error("[ATP] ATS.ATP.table.load bukan fungsi");
      return;
    }

    const tableBody = document.getElementById("tblATP");

    if (!tableBody) {
      console.log("[ATP] Halaman ATP belum tampil, load dibatalkan");
      return;
    }

    ATS.ATP.table.load();
  }

  window.initATPPage = initATPPage;

  document.addEventListener("DOMContentLoaded", function () {
    setTimeout(initATPPage, 100);
  });

})();
</script>
